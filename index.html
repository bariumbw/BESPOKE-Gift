<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>供應商系統</title>
    <style>
        :root { 
            --primary: #7f8c8d;
            --accent: #f8d7da;
            --bg: #fdf2f4;
            --success: #e8aeb7;
            --text: #5d5d5d;
            --white: #ffffff;
        }
        
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .container { max-width: 900px; margin: 20px auto; background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); box-sizing: border-box; }
        .header-logo { width: 90px; margin-bottom: 15px; display: block; }
        
        #login-section { text-align: center; padding: 30px 0; }
        .login-box { max-width: 350px; margin: 0 auto; }
        
        #control-panel { display: none; background: #fef9fa; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #f2e1e4; box-sizing: border-box; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 10px; }
        
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        input, button, select { padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; }
        
        button { background: var(--primary); color: white; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-reload { background: var(--success); color: white; }
        .btn-logout { background: #bdc3c7; }

        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; margin-top: 5px; flex-wrap: wrap; gap: 10px; }
        .sort-controls { display: flex; align-items: center; gap: 8px; }
        
        select { background-color: white; border-color: var(--accent); }
        
        .order-toggle { background: #fff; color: var(--primary); border: 1px solid var(--accent); display: flex; padding: 0; overflow: hidden; }
        .order-toggle span { padding: 8px 12px; transition: 0.3s; cursor: pointer; font-size: 13px; }
        .order-toggle span.active { background: var(--success); color: white; }

        .order-card { background: #fff; border: 1px solid #f2e1e4; border-radius: 8px; margin-bottom: 15px; padding: 18px; border-left: 4px solid var(--accent); }
        .info-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; }
        .label { font-size: 12px; color: #a1a1a1; font-weight: bold; margin-bottom: 4px; display: block; }
        .val { font-size: 14px; color: var(--text); white-space: pre-wrap; word-break: break-all; margin-bottom: 12px; line-height: 1.5; }
        
        h2, h4 { margin-top: 0; color: var(--primary); }
        .count-tag { font-size: 14px; color: #999; }
        .loading-spin { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; margin-right: 5px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============================================================
           手機專屬額外樣式 (螢幕寬度 < 600px)
           ============================================================ */
        @media (max-width: 600px) {
            body { padding: 8px; }
            .container { padding: 12px; margin: 5px auto; overflow: hidden; }
            
            #control-panel .btn-group { width: 100%; order: -1; margin-bottom: 15px; }
            #control-panel .btn-group button { flex: 1; font-size: 13px; }
            
            #control-panel h4 { width: 100%; text-align: left; margin-bottom: 10px; }
            #control-panel > div:first-child { flex-direction: column; align-items: flex-start !important; }
            
            .filter-grid { 
                grid-template-columns: 1fr 1fr; 
                gap: 12px; 
                width: 100%; 
            }
            .filter-grid input { 
                font-size: 11px; 
                padding: 4px 2px; 
                border: 1px solid #eee; 
                width: 100%; 
                margin: 0; 
                height: 32px; 
            }
            .filter-grid .label { font-size: 10px; margin-bottom: 2px; }
            
            .status-bar { flex-direction: column; align-items: flex-start; gap: 12px; }
            .sort-controls { width: 100%; justify-content: space-between; }

            .order-card { padding: 15px; margin-bottom: 12px; box-sizing: border-box; }
            .info-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .val { font-size: 14px; margin-bottom: 8px; }
            .label { font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.bespoke-mall.com/pub/media/webp_image/logo/stores/1/BespokeMallv4.webp" alt="LOGO" class="header-logo">

    <div id="login-section">
        <h2>供應商系統</h2>
        <div class="login-box">
            <input type="text" id="supplierKey" placeholder="請輸入供應商識別碼" style="width:100%; margin-bottom:10px; border-color: #f2e1e4;">
            <button id="loginBtn" onclick="doLogin()" style="width:100%;">登入</button>
            <p id="login-msg" style="color:#e8aeb7; font-size:14px; display:none; margin-top:10px; font-weight: bold;">找不到此識別碼，請確認資料格式</p>
        </div>
    </div>

    <div id="control-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 10px;">
            <h4>訂單篩選 <span id="staff-badge" style="display:none; font-size:10px; background:var(--primary); color:white; padding:2px 6px; border-radius:10px; margin-left:5px;">管理員模式</span></h4>
            <div class="btn-group">
                <button class="btn-reload" id="reloadBtn" onclick="reloadData()">更新資料</button>
                <button class="btn-logout" onclick="location.reload()">登出</button>
            </div>
        </div>
        <div class="filter-grid">
            <div><span class="label">日期 (起)</span><input type="date" id="filter-start" onchange="applyFilters()"></div>
            <div><span class="label">日期 (迄)</span><input type="date" id="filter-end" onchange="applyFilters()"></div>
            <div><span class="label">姓名</span><input type="text" id="filter-name" placeholder="搜尋..." oninput="applyFilters()"></div>
            <div><span class="label">單號</span><input type="text" id="filter-id" placeholder="搜尋..." oninput="applyFilters()"></div>
        </div>
    </div>

    <div id="result-header" class="status-bar" style="display:none;">
        <div id="status-msg" class="count-tag"></div>
        <div class="sort-controls">
            <select id="sortField" onchange="handleSort()">
                <option value="id" selected>單號排序</option>
                <option value="date">送貨日期</option>
            </select>
            <div class="order-toggle">
                <span id="order-asc" onclick="setSortOrder('asc')">升序</span>
                <span id="order-desc" class="active" onclick="setSortOrder('desc')">降序</span>
            </div>
        </div>
    </div>
    
    <div id="result-list"></div>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSy5sD3WWgYrJg9dqHPQgtDlD1iOdxDSWMaPoN6UEjfM89GCPT8JWHu-8qg8Likhw2DOSjnP0J6zOYK/pub?output=csv';
    const STAFF_KEY = "BESPOKE01"; 
    let allSupplierData = [];
    let currentKey = "";
    let isStaff = false;
    let filteredData = [];
    let currentSortOrder = 'desc';

    function parseCSVStrict(str) {
        const arr = [];
        let quote = false;
        for (let row = col = c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || [];
            arr[row][col] = arr[row][col] || '';
            if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
            if (cc == '\n' && !quote) { ++row; col = 0; continue; }
            if (cc == '\r' && !quote) { ++row; col = 0; continue; }
            arr[row][col] += cc;
        }
        return arr;
    }

    function parseDateSmart(dateStr) {
        if (!dateStr || dateStr === '-' || dateStr.trim() === "") return null;
        let d = new Date(dateStr);
        if (!isNaN(d.getTime())) return d;
        const m = dateStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
        if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
        return null;
    }

    function formatDate(dateStr) {
        const d = parseDateSmart(dateStr);
        return d ? `${d.getFullYear()}年${String(d.getMonth() + 1).padStart(2, '0')}月${String(d.getDate()).padStart(2, '0')}日` : (dateStr || '-');
    }

    async function loadDataFromServer() {
        try {
            const resp = await fetch(SHEET_CSV + '&t=' + Date.now());
            const text = await resp.text();
            const rows = parseCSVStrict(text);
            
            if (isStaff) {
                allSupplierData = rows.slice(1).filter(r => r[3]); 
            } else {
                const sk = currentKey.trim().toLowerCase();
                allSupplierData = rows.filter(r => r[2] && r[2].trim().toLowerCase() === sk);
            }
            return allSupplierData.length > 0;
        } catch (e) { return false; }
    }

    async function doLogin() {
        currentKey = document.getElementById('supplierKey').value.trim();
        if (!currentKey) return;
        
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spin"></span>';
        
        isStaff = (currentKey.toUpperCase() === STAFF_KEY);
        
        if (await loadDataFromServer()) {
            document.getElementById('login-section').style.display = "none";
            document.getElementById('control-panel').style.display = "block";
            document.getElementById('result-header').style.display = "flex";
            if(isStaff) document.getElementById('staff-badge').style.display = "inline-block";
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('filter-start').value = today;
            applyFilters();
        } else {
            document.getElementById('login-msg').style.display = "block";
            btn.disabled = false;
            btn.innerText = "登入";
        }
    }

    async function reloadData() {
        const btn = document.getElementById('reloadBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spin"></span>';
        await loadDataFromServer();
        applyFilters();
        setTimeout(() => { btn.disabled = false; btn.innerText = "更新資料"; }, 500);
    }

    function setSortOrder(order) {
        currentSortOrder = order;
        document.getElementById('order-asc').classList.toggle('active', order === 'asc');
        document.getElementById('order-desc').classList.toggle('active', order === 'desc');
        handleSort();
    }

    function handleSort() {
        const field = document.getElementById('sortField').value;
        const isAsc = currentSortOrder === 'asc';
        filteredData.sort((a, b) => {
            if (field === 'id') return isAsc ? (a[3]||"").localeCompare(b[3]||"", undefined, {numeric: true}) : (b[3]||"").localeCompare(a[3]||"", undefined, {numeric: true});
            const dA = parseDateSmart(a[5])?.getTime() || 0;
            const dB = parseDateSmart(b[5])?.getTime() || 0;
            return isAsc ? (dA - dB) : (dB - dA);
        });
        renderList(filteredData);
    }

    function applyFilters() {
        const s = document.getElementById('filter-start').value;
        const e = document.getElementById('filter-end').value;
        const nk = document.getElementById('filter-name').value.toLowerCase();
        const ik = document.getElementById('filter-id').value.toLowerCase();
        const sT = s ? new Date(s).setHours(0,0,0,0) : null;
        const eT = e ? new Date(e).setHours(23,59,59,999) : null;

        filteredData = allSupplierData.filter(r => {
            const d = parseDateSmart(r[5]);
            let dM = true;
            if (sT && (!d || d.getTime() < sT)) dM = false;
            if (eT && (!d || d.getTime() > eT)) dM = false;
            return dM && (r[4]||"").toLowerCase().includes(nk) && (r[3]||"").toLowerCase().includes(ik);
        });
        handleSort();
    }

    function renderList(data) {
        const area = document.getElementById('result-list');
        area.innerHTML = "";
        document.getElementById('status-msg').innerText = `已找到 ${data.length} 筆訂單`;
        data.forEach(r => {
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div class="info-grid">
                    <div class="col-left">
                        <span class="label">下單日期</span><div class="val">${formatDate(r[1])}</div>
                        <span class="label">客人姓名</span><div class="val">${r[4] || '-'}</div>
                        <span class="label">產品及數量</span><div class="val" style="font-weight:bold;">${r[7] || '-'}</div>
                        <span class="label">備註</span><div class="val">${r[8] || '-'}</div>
                    </div>
                    <div class="col-right">
                        <span class="label">單號</span><div class="val" style="color:var(--primary); font-weight:bold;">${r[3] || '-'}</div>
                        <span class="label">送貨日期</span><div class="val" style="font-weight:bold;">${formatDate(r[5])}</div>
                        <span class="label">送貨地址</span><div class="val">${r[6] || '-'}</div>
                        ${isStaff ? `<span class="label">供應商識別碼</span><div class="val" style="color:#7f8c8d; font-size:12px;">${r[2] || '-'}</div>` : ''}
                    </div>
                </div>
            `;
            area.appendChild(card);
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供應商管理系統</title>
    <style>
        :root { --primary: #2c3e50; --accent: #c5a059; --bg: #f4f7f6; --success: #27ae60; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        #login-section { text-align: center; padding: 40px 0; }
        .login-box { max-width: 350px; margin: 0 auto; }
        
        #control-panel { display: none; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #eee; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 10px; }
        
        .btn-group { display: flex; gap: 8px; }
        input, button { padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; }
        button { background: var(--primary); color: white; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-reload { background: var(--success); }
        .btn-logout { background: #95a5a6; }

        .order-card { background: #fff; border: 1px solid #eef0f2; border-radius: 8px; margin-bottom: 15px; padding: 18px; border-left: 4px solid var(--primary); }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
        
        .label { font-size: 12px; color: #999; font-weight: bold; margin-bottom: 2px; display: block; }
        .val { font-size: 15px; color: #333; word-break: break-all; }
        .full { grid-column: span 2; }
        @media (max-width: 600px) { .full { grid-column: span 1; } }

        h2, h4 { margin-top: 0; color: var(--primary); }
        .count-tag { font-size: 14px; color: #666; margin-bottom: 10px; }
        
        .loading-spin { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-right: 5px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h2>供應商登入</h2>
        <div class="login-box">
            <input type="password" id="supplierKey" placeholder="請輸入供應商識別碼" style="width:100%; margin-bottom:10px;">
            <button id="loginBtn" onclick="doLogin()" style="width:100%;">驗證並讀取資料</button>
            <p id="login-msg" style="color:red; font-size:14px; display:none;">識別碼錯誤</p>
        </div>
    </div>

    <div id="control-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 10px;">
            <h4>資料篩選器</h4>
            <div class="btn-group">
                <button class="btn-reload" id="reloadBtn" onclick="reloadData()">重新載入最新資料</button>
                <button class="btn-logout" onclick="location.reload()">重新登入</button>
            </div>
        </div>
        <div class="filter-grid">
            <div>
                <span class="label">送貨日期 (起)</span>
                <input type="date" id="filter-start" onchange="applyFilters()">
            </div>
            <div>
                <span class="label">送貨日期 (迄)</span>
                <input type="date" id="filter-end" onchange="applyFilters()">
            </div>
            <div>
                <span class="label">客人姓名</span>
                <input type="text" id="filter-name" placeholder="搜尋姓名..." oninput="applyFilters()">
            </div>
            <div>
                <span class="label">單號</span>
                <input type="text" id="filter-id" placeholder="搜尋單號..." oninput="applyFilters()">
            </div>
        </div>
    </div>

    <div id="status-msg" class="count-tag"></div>
    <div id="result-list"></div>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSy5sD3WWgYrJg9dqHPQgtDlD1iOdxDSWMaPoN6UEjfM89GCPT8JWHu-8qg8Likhw2DOSjnP0J6zOYK/pub?output=csv';
    
    let allSupplierData = [];
    let currentKey = "";

    // 【新增/優化】智慧型日期解析器：專門處理 Sheet 中的文字型日期
    function parseDateSmart(dateStr) {
        if (!dateStr || dateStr === '-' || dateStr.trim() === "") return null;
        
        // 嘗試標準解析 (處理 YYYY/MM/DD, YYYY-MM-DD 等)
        let d = new Date(dateStr);
        if (!isNaN(d.getTime())) return d;

        // 【核心修正】手動拆解純文字型中文日期 (XXXX年XX月XX日)
        const chineseDateMatch = dateStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
        if (chineseDateMatch) {
            const year = parseInt(chineseDateMatch[1]);
            const month = parseInt(chineseDateMatch[2]);
            const day = parseInt(chineseDateMatch[3]);
            // JavaScript Date 物件的月份索引是從 0 開始
            d = new Date(year, month - 1, day);
            if (!isNaN(d.getTime())) return d;
        }

        // 如果解析失敗，傳回 null，而不是原文字
        return null; 
    }

    // 格式化顯示用：YYYY年MM月DD日 (僅用於顯示，不影響搜尋邏輯)
    function formatDateChinese(dateObj) {
        if (!dateObj) return '-'; // parseDateSmart 失敗時顯示槓
        return `${dateObj.getFullYear()}年${String(dateObj.getMonth() + 1).padStart(2, '0')}月${String(dateObj.getDate()).padStart(2, '0')}日`;
    }

    async function loadDataFromServer() {
        try {
            const resp = await fetch(SHEET_CSV + '&t=' + Date.now());
            const text = await resp.text();
            const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            allSupplierData = rows.filter(r => r[2] && r[2].replace(/"/g, '').trim() === currentKey);
            return allSupplierData.length > 0;
        } catch (e) { return false; }
    }

    async function doLogin() {
        currentKey = document.getElementById('supplierKey').value.trim();
        if (!currentKey) return;
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spin"></span> 讀取中...';
        if (await loadDataFromServer()) {
            document.getElementById('login-section').style.display = "none";
            document.getElementById('control-panel').style.display = "block";
            applyFilters();
        } else {
            document.getElementById('login-msg').style.display = "block";
            btn.disabled = false;
            btn.innerText = "驗證並讀取資料";
        }
    }

    async function reloadData() {
        const btn = document.getElementById('reloadBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spin"></span> 更新中...';
        await loadDataFromServer();
        applyFilters();
        setTimeout(() => { btn.disabled = false; btn.innerText = "重新載入最新資料"; }, 500);
    }

    // 【核心修正】搜尋篩選邏輯，強制將文字日期與標準日期物件比對
    function applyFilters() {
        const startVal = document.getElementById('filter-start').value; // YYYY-MM-DD 文字
        const endVal = document.getElementById('filter-end').value;
        const nameKwd = document.getElementById('filter-name').value.toLowerCase();
        const idKwd = document.getElementById('filter-id').value.toLowerCase();

        // 轉換搜尋範圍為時間戳
        const startTime = startVal ? new Date(startVal).setHours(0,0,0,0) : null;
        const endTime = endVal ? new Date(endVal).setHours(23,59,59,999) : null;

        const filtered = allSupplierData.filter(row => {
            const rawDelivDate = row[5] ? row[5].replace(/"/g, '').trim() : "";
            const name = row[4] ? row[4].replace(/"/g, '').trim().toLowerCase() : "";
            const orderId = row[3] ? row[3].replace(/"/g, '').trim().toLowerCase() : "";

            let dateMatch = true;
            
            // 使用新的智慧型解析函數
            const dObj = parseDateSmart(rawDelivDate);

            if (startTime || endTime) {
                if (dObj) {
                    const dTime = dObj.getTime();
                    if (startTime && dTime < startTime) dateMatch = false;
                    if (endTime && dTime > endTime) dateMatch = false;
                } else {
                    // 有設日期範圍，但該筆資料無合法日期 (包括解析失敗)，則不顯示
                    dateMatch = false; 
                }
            }

            return dateMatch && name.includes(nameKwd) && orderId.includes(idKwd);
        });

        renderList(filtered);
    }

    function renderList(data) {
        const listArea = document.getElementById('result-list');
        listArea.innerHTML = "";
        document.getElementById('status-msg').innerText = `顯示筆數：${data.length}`;
        data.forEach(row => {
            // 【修正】在顯示時解析一次，獲取日期物件
            const delDateObj = parseDateSmart(clean(row[5]));
            
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div class="info-grid">
                    <div class="item"><span class="label">下單日期</span><div class="val">${formatDateChinese(parseDateSmart(clean(row[1])))}</div></div>
                    <div class="item"><span class="label">單號</span><div class="val">${clean(row[3])}</div></div>
                    <div class="item"><span class="label">客人姓名</span><div class="val">${clean(row[4])}</div></div>
                    <div class="item"><span class="label">送貨日期</span><div class="val">${formatDateChinese(delDateObj)}</div></div>
                    <div class="item full"><span class="label">送貨地址</span><div class="val">${clean(row[6])}</div></div>
                    <div class="item full"><span class="label">產品及數量</span><div class="val">${clean(row[7])}</div></div>
                    <div class="item full"><span class="label">備註</span><div class="val">${clean(row[8])}</div></div>
                </div>
            `;
            listArea.appendChild(card);
        });
    }

    function clean(str) { return str ? str.replace(/"/g, '').trim() : '-'; }
</script>
</body>
</html>

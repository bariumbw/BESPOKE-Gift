<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供應商管理系統</title>
    <style>
        /* 配色調整為粉色與灰色為主 */
        :root { 
            --primary: #7f8c8d;    /* 深灰色 */
            --accent: #f8d7da;     /* 淺粉色 */
            --bg: #fdf2f4;         /* 極淡粉色背景 */
            --success: #e8aeb7;    /* 粉紅成功色 */
            --text: #5d5d5d;       /* 灰黑文字 */
            --white: #ffffff;
        }
        
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .container { max-width: 900px; margin: 20px auto; background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        .header-logo { width: 90px; margin-bottom: 15px; display: block; }
        
        #login-section { text-align: center; padding: 30px 0; }
        .login-box { max-width: 350px; margin: 0 auto; }
        
        #control-panel { display: none; background: #fef9fa; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #f2e1e4; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 10px; }
        
        .btn-group { display: flex; gap: 8px; }
        input, button { padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; }
        
        button { background: var(--primary); color: white; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-reload { background: var(--success); color: white; }
        .btn-logout { background: #bdc3c7; }

        .order-card { background: #fff; border: 1px solid #f2e1e4; border-radius: 8px; margin-bottom: 15px; padding: 18px; border-left: 4px solid var(--accent); }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        .label { font-size: 12px; color: #a1a1a1; font-weight: bold; margin-bottom: 2px; display: block; }
        .val { font-size: 15px; color: var(--text); white-space: pre-wrap; word-break: break-all; }
        .full { grid-column: span 2; }
        
        @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } .full { grid-column: span 1; } }

        h2, h4 { margin-top: 0; color: var(--primary); }
        .count-tag { font-size: 14px; color: #999; margin-bottom: 10px; }
        
        .loading-spin { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; margin-right: 5px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.bespoke-mall.com/pub/media/webp_image/logo/stores/1/BespokeMallv4.webp" alt="LOGO" class="header-logo">

    <div id="login-section">
        <h2>供應商管理登入</h2>
        <div class="login-box">
            <input type="text" id="supplierKey" placeholder="請輸入供應商識別碼" style="width:100%; margin-bottom:10px; border-color: #f2e1e4;">
            <button id="loginBtn" onclick="doLogin()" style="width:100%;">驗證並讀取資料</button>
            <p id="login-msg" style="color:#e8aeb7; font-size:14px; display:none; margin-top:10px; font-weight: bold;">找不到此識別碼，請確認資料格式</p>
        </div>
    </div>

    <div id="control-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 10px;">
            <h4>訂單篩選</h4>
            <div class="btn-group">
                <button class="btn-reload" id="reloadBtn" onclick="reloadData()">更新資料</button>
                <button class="btn-logout" onclick="location.reload()">登出</button>
            </div>
        </div>
        <div class="filter-grid">
            <div><span class="label">送貨日期 (起)</span><input type="date" id="filter-start" onchange="applyFilters()"></div>
            <div><span class="label">送貨日期 (迄)</span><input type="date" id="filter-end" onchange="applyFilters()"></div>
            <div><span class="label">客人姓名</span><input type="text" id="filter-name" placeholder="搜尋姓名..." oninput="applyFilters()"></div>
            <div><span class="label">單號</span><input type="text" id="filter-id" placeholder="搜尋單號..." oninput="applyFilters()"></div>
        </div>
    </div>

    <div id="status-msg" class="count-tag"></div>
    <div id="result-list"></div>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSy5sD3WWgYrJg9dqHPQgtDlD1iOdxDSWMaPoN6UEjfM89GCPT8JWHu-8qg8Likhw2DOSjnP0J6zOYK/pub?output=csv';
    let allSupplierData = [];
    let currentKey = "";

    // 工業級 CSV 解析：處理換行與雙引號
    function parseCSVStrict(str) {
        const arr = [];
        let quote = false;
        for (let row = col = c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || [];
            arr[row][col] = arr[row][col] || '';
            if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
            if (cc == '\n' && !quote) { ++row; col = 0; continue; }
            if (cc == '\r' && !quote) { ++row; col = 0; continue; }
            arr[row][col] += cc;
        }
        return arr;
    }

    function parseDateSmart(dateStr) {
        if (!dateStr || dateStr === '-' || dateStr.trim() === "") return null;
        let d = new Date(dateStr);
        if (!isNaN(d.getTime())) return d;
        const m = dateStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
        if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
        return null;
    }

    function formatDate(dateStr) {
        const d = parseDateSmart(dateStr);
        return d ? `${d.getFullYear()}年${String(d.getMonth() + 1).padStart(2, '0')}月${String(d.getDate()).padStart(2, '0')}日` : (dateStr || '-');
    }

    async function loadDataFromServer() {
        try {
            const resp = await fetch(SHEET_CSV + '&t=' + Date.now());
            const text = await resp.text();
            const rows = parseCSVStrict(text);
            const sk = currentKey.trim().toLowerCase();
            allSupplierData = rows.filter(r => r[2] && r[2].trim().toLowerCase() === sk);
            return allSupplierData.length > 0;
        } catch (e) { return false; }
    }

    async function doLogin() {
        currentKey = document.getElementById('supplierKey').value.trim();
        if (!currentKey) return;
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spin"></span> 載入中...';
        if (await loadDataFromServer()) {
            document.getElementById('login-section').style.display = "none";
            document.getElementById('control-panel').style.display = "block";
            applyFilters();
        } else {
            document.getElementById('login-msg').style.display = "block";
            btn.disabled = false;
            btn.innerText = "驗證並讀取資料";
        }
    }

    async function reloadData() {
        const btn = document.getElementById('reloadBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spin"></span>';
        await loadDataFromServer();
        applyFilters();
        setTimeout(() => { btn.disabled = false; btn.innerText = "更新資料"; }, 500);
    }

    function applyFilters() {
        const start = document.getElementById('filter-start').value;
        const end = document.getElementById('filter-end').value;
        const nameK = document.getElementById('filter-name').value.toLowerCase();
        const idK = document.getElementById('filter-id').value.toLowerCase();
        const sTime = start ? new Date(start).setHours(0,0,0,0) : null;
        const eTime = end ? new Date(end).setHours(23,59,59,999) : null;

        const filtered = allSupplierData.filter(r => {
            const d = parseDateSmart(r[5]);
            let dM = true;
            if (sTime || eTime) {
                if (d) {
                    const t = d.getTime();
                    if (sTime && t < sTime) dM = false;
                    if (eTime && t > eTime) dM = false;
                } else { dM = false; }
            }
            return dM && (r[4]||"").toLowerCase().includes(nameK) && (r[3]||"").toLowerCase().includes(idK);
        });
        renderList(filtered);
    }

    function renderList(data) {
        const area = document.getElementById('result-list');
        area.innerHTML = "";
        document.getElementById('status-msg').innerText = `已找到 ${data.length} 筆訂單`;
        data.forEach(r => {
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div class="info-grid">
                    <div class="item"><span class="label">下單日期</span><div class="val">${formatDate(r[1])}</div></div>
                    <div class="item"><span class="label">單號</span><div class="val">${r[3] || '-'}</div></div>
                    <div class="item"><span class="label">客人姓名</span><div class="val">${r[4] || '-'}</div></div>
                    <div class="item"><span class="label">送貨日期</span><div class="val">${formatDate(r[5])}</div></div>
                    <div class="item full"><span class="label">送貨地址</span><div class="val">${r[6] || '-'}</div></div>
                    <div class="item full"><span class="label">產品及數量</span><div class="val">${r[7] || '-'}</div></div>
                    <div class="item full"><span class="label">備註</span><div class="val">${r[8] || '-'}</div></div>
                </div>
            `;
            area.appendChild(card);
        });
    }
</script>
</body>
</html>

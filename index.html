<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供應商出貨查詢系統</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 2rem; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 2rem; justify-content: center; }
        input { padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; width: 250px; font-size: 16px; }
        button { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button:hover { background: #1d4ed8; }

        .table-wrapper { overflow-x: auto; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; min-width: 700px; }
        th { background: #f1f5f9; text-align: left; padding: 12px; font-size: 0.875rem; text-transform: uppercase; color: #64748b; }
        td { padding: 16px 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        tr:last-child td { border: none; }
        .remark { color: #64748b; font-size: 0.85rem; font-style: italic; }
        .error { color: #ef4444; text-align: center; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h2>出貨進度查詢系統</h2>
            <p>請輸入您的供應商識別碼以查看最新狀態</p>
        </div>

        <div class="search-box">
            <input type="text" id="sid" placeholder="請輸入識別碼...">
            <button onclick="queryData()">查詢</button>
        </div>
        <div id="error" class="error">找不到相關資料，請檢查代碼是否正確。</div>

        <div id="result" class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>單號</th>
                        <th>客人姓名</th>
                        <th>送貨日期</th>
                        <th>送貨地址</th>
                        <th>備註 (Remark)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function queryData() {
        const sid = document.getElementById('sid').value.trim();
        const errorDiv = document.getElementById('error');
        const resultDiv = document.getElementById('result');
        const tbody = document.getElementById('tableBody');

        if (!sid) return;

        try {
            // 從 GitHub 抓取最新的 JSON 資料
            const response = await fetch('data.json?v=' + new Date().getTime());
            const data = await response.json();
            
            const results = data.filter(item => item.supplier_id === sid);

            if (results.length > 0) {
                errorDiv.style.display = 'none';
                resultDiv.style.display = 'block';
                tbody.innerHTML = results.map(row => `
                    <tr>
                        <td><strong>${row.order_no}</strong></td>
                        <td>${row.customer_name}</td>
                        <td>${row.delivery_date}</td>
                        <td>${row.address}</td>
                        <td class="remark">${row.remark || '-'}</td>
                    </tr>
                `).join('');
            } else {
                resultDiv.style.display = 'none';
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            alert('系統連線失敗，請稍後再試。');
        }
    }
</script>

</body>
</html>

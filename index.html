<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供應商即時出貨查詢系統</title>
    <style>
        :root { --primary: #007bff; --bg: #f8f9fa; --text: #333; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 25px; }
        
        /* 搜尋區 */
        .search-area { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 8px; width: 260px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }

        /* 表格區 */
        .table-responsive { overflow-x: auto; display: none; margin-top: 20px; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f1f3f5; padding: 12px; text-align: left; font-size: 14px; color: #555; }
        td { padding: 15px 12px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: top; }
        
        .product-tag { color: #d9534f; font-weight: bold; }
        .remark-text { color: #6c757d; font-size: 13px; }
        .loading { display: none; text-align: center; color: var(--primary); font-weight: bold; margin: 15px 0; }
        .error { display: none; text-align: center; color: #d9534f; background: #f8d7da; padding: 10px; border-radius: 6px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h2>供應商出貨查詢 (即時同步版)</h2>
            <p>輸入識別碼即可查看您品牌的最新訂單狀態</p>
        </div>

        <div class="search-area">
            <input type="text" id="sidInput" placeholder="輸入 supplier_id">
            <button onclick="fetchData()">查詢</button>
        </div>

        <div id="loading" class="loading">正在連線至 Google Sheets 資料庫...</div>
        <div id="errorMsg" class="error">查無資料，請確認識別碼或聯繫代理商。</div>

        <div id="resultBox" class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>單號</th>
                        <th>客人姓名</th>
                        <th>送貨日期</th>
                        <th>送貨地址</th>
                        <th>產品及數量</th>
                        <th>備註 (Remark)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 這裡填入你剛剛獲得的 Web App 網址
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxNaH1zPAxdSsq8I9b9BDQcnJnAzLx_HuG_iRdGrt8ChdmcnESDwoJD0nz_HVcle2Wx1Q/exec";

    async function fetchData() {
        const sid = document.getElementById('sidInput').value.trim();
        const loading = document.getElementById('loading');
        const error = document.getElementById('errorMsg');
        const resultBox = document.getElementById('resultBox');
        const tbody = document.getElementById('tableBody');

        if (!sid) return;

        // 初始化顯示狀態
        loading.style.display = 'block';
        error.style.display = 'none';
        resultBox.style.display = 'none';

        try {
            // 呼叫 Apps Script API 並傳入 sid 參數
            const response = await fetch(`${WEB_APP_URL}?sid=${encodeURIComponent(sid)}`);
            const data = await response.json();

            if (data && data.length > 0) {
                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td><strong>${item.order_no || '-'}</strong></td>
                        <td>${item.customer || '-'}</td>
                        <td>${item.date || '-'}</td>
                        <td>${row_address(item.address)}</td>
                        <td class="product-tag">${item.product || '-'}</td>
                        <td class="remark-text">${item.remark || '-'}</td>
                    </tr>
                `).join('');
                
                loading.style.display = 'none';
                resultBox.style.display = 'block';
            } else {
                throw new Error("No data");
            }
        } catch (e) {
            loading.style.display = 'none';
            error.style.display = 'block';
        }
    }

    // 處理地址中可能出現的換行或逗號
    function row_address(addr) {
        if (!addr) return '-';
        return addr.toString().replace(/"/g, '');
    }
</script>

</body>
</html>

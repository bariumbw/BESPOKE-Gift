<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供應商系統 (電腦/手機自動切換版)</title>
    <style>
        :root { 
            --primary: #7f8c8d;
            --accent: #f8d7da;
            --bg: #fdf2f4;
            --success: #e8aeb7;
            --text: #5d5d5d;
            --white: #ffffff;
        }
        
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .container { max-width: 1000px; margin: 20px auto; background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .header-logo { width: 90px; margin-bottom: 15px; display: block; }
        
        /* 基礎按鈕樣式 (電腦手機通用) */
        input, button, select { padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; }
        button { background: var(--primary); color: white; cursor: pointer; border: none; font-weight: bold; }
        .btn-reload { background: var(--success); }
        .btn-logout { background: #bdc3c7; }

        /* ============================================================
           電腦版本樣式 (螢幕寬度 > 768px) - 維持原始橫向完整顯示
           ============================================================ */
        #control-panel { display: none; background: #fef9fa; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #f2e1e4; }
        .btn-group { display: flex; gap: 8px; float: right; }
        .filter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; clear: both; }
        
        .status-bar { display: none; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .sort-controls { display: flex; align-items: center; gap: 8px; }
        .order-toggle { background: #fff; color: var(--primary); border: 1px solid var(--accent); display: flex; overflow: hidden; }
        .order-toggle span { padding: 8px 12px; cursor: pointer; font-size: 13px; }
        .order-toggle span.active { background: var(--success); color: white; }

        .order-card { background: #fff; border: 1px solid #f2e1e4; border-radius: 8px; margin-bottom: 15px; padding: 18px; border-left: 4px solid var(--accent); }
        .info-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .label { font-size: 12px; color: #a1a1a1; font-weight: bold; display: block; margin-bottom: 2px; }
        .val { font-size: 15px; color: var(--text); margin-bottom: 10px; word-break: break-all; line-height: 1.4; }

        /* ============================================================
           手機版本樣式 (螢幕寬度 < 768px) - 專屬優化
           ============================================================ */
        @media (max-width: 767px) {
            body { padding: 8px; }
            .container { padding: 12px; margin: 5px auto; }
            
            /* 按鈕上移邏輯 */
            .btn-group { width: 100%; float: none; margin-bottom: 15px; display: flex; }
            .btn-group button { flex: 1; padding: 12px; }
            
            /* 日期起迄並排不超出 */
            .filter-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            
            /* 筆數與排序切換為堆疊 */
            .status-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
            .sort-controls { width: 100%; justify-content: space-between; }
            .sort-controls select { flex: 1; }

            /* 雙欄卡片邏輯 */
            #result-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
            .order-card { padding: 10px; border-left: none; border-top: 4px solid var(--accent); margin-bottom: 0; }
            .info-grid { display: block; } /* 在小卡片內轉為垂直顯示內容 */
            .val { font-size: 13px; margin-bottom: 8px; }
            .label { font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.bespoke-mall.com/pub/media/webp_image/logo/stores/1/BespokeMallv4.webp" alt="LOGO" class="header-logo">

    <div id="login-section" style="text-align: center;">
        <h3>供應商系統登入</h3>
        <input type="text" id="supplierKey" placeholder="輸入識別碼" style="width: 100%; max-width: 300px; margin-bottom:10px;">
        <br>
        <button onclick="doLogin()" style="width: 100%; max-width: 300px; padding: 12px;">登入</button>
        <p id="login-msg" style="color:#e8aeb7; display:none; margin-top:10px;">識別碼錯誤</p>
    </div>

    <div id="control-panel">
        <div class="btn-group">
            <button class="btn-reload" onclick="reloadData()">更新資料</button>
            <button class="btn-logout" onclick="location.reload()">登出系統</button>
        </div>
        
        <div class="filter-grid">
            <div><span class="label">日期 (起)</span><input type="date" id="filter-start" onchange="applyFilters()"></div>
            <div><span class="label">日期 (迄)</span><input type="date" id="filter-end" onchange="applyFilters()"></div>
            <div><span class="label">姓名</span><input type="text" id="filter-name" placeholder="搜尋..." oninput="applyFilters()"></div>
            <div><span class="label">單號</span><input type="text" id="filter-id" placeholder="搜尋..." oninput="applyFilters()"></div>
        </div>
    </div>

    <div id="result-header" class="status-bar">
        <div id="status-msg" style="font-size: 13px; font-weight: bold; color: #999;"></div>
        <div class="sort-controls">
            <select id="sortField" onchange="handleSort()">
                <option value="id" selected>單號排序</option>
                <option value="date">日期排序</option>
            </select>
            <div class="order-toggle">
                <span id="order-asc" onclick="setSortOrder('asc')">升</span>
                <span id="order-desc" class="active" onclick="setSortOrder('desc')">降</span>
            </div>
        </div>
    </div>
    
    <div id="result-list"></div>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSy5sD3WWgYrJg9dqHPQgtDlD1iOdxDSWMaPoN6UEjfM89GCPT8JWHu-8qg8Likhw2DOSjnP0J6zOYK/pub?output=csv';
    let allSupplierData = [];
    let currentKey = "";
    let filteredData = [];
    let currentSortOrder = 'desc';

    function parseCSVStrict(str) {
        const arr = []; let quote = false;
        for (let row = col = c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
            if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\n' && !quote) { ++row; col = 0; continue; }
            arr[row][col] += cc;
        }
        return arr;
    }

    function parseDateSmart(dateStr) {
        if (!dateStr || dateStr === '-') return null;
        let d = new Date(dateStr);
        if (!isNaN(d.getTime())) return d;
        const m = dateStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
        return m ? new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3])) : null;
    }

    function formatDate(dateStr) {
        const d = parseDateSmart(dateStr);
        return d ? `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}` : (dateStr || '-');
    }

    async function loadDataFromServer() {
        try {
            const resp = await fetch(SHEET_CSV + '&t=' + Date.now());
            const text = await resp.text();
            allSupplierData = parseCSVStrict(text).filter(r => r[2] && r[2].trim().toLowerCase() === currentKey.trim().toLowerCase());
            return allSupplierData.length > 0;
        } catch (e) { return false; }
    }

    async function doLogin() {
        currentKey = document.getElementById('supplierKey').value;
        if (!currentKey) return;
        if (await loadDataFromServer()) {
            document.getElementById('login-section').style.display = "none";
            document.getElementById('control-panel').style.display = "block";
            document.getElementById('result-header').style.display = "flex";
            applyFilters();
        } else {
            document.getElementById('login-msg').style.display = "block";
        }
    }

    async function reloadData() {
        await loadDataFromServer();
        applyFilters();
    }

    function setSortOrder(order) {
        currentSortOrder = order;
        document.getElementById('order-asc').classList.toggle('active', order === 'asc');
        document.getElementById('order-desc').classList.toggle('active', order === 'desc');
        handleSort();
    }

    function handleSort() {
        const field = document.getElementById('sortField').value;
        const isAsc = currentSortOrder === 'asc';
        filteredData.sort((a, b) => {
            if (field === 'id') return isAsc ? a[3].localeCompare(b[3], undefined, {numeric:true}) : b[3].localeCompare(a[3], undefined, {numeric:true});
            return isAsc ? (parseDateSmart(a[5]) - parseDateSmart(b[5])) : (parseDateSmart(b[5]) - parseDateSmart(a[5]));
        });
        renderList(filteredData);
    }

    function applyFilters() {
        const s = document.getElementById('filter-start').value;
        const e = document.getElementById('filter-end').value;
        const nk = document.getElementById('filter-name').value.toLowerCase();
        const ik = document.getElementById('filter-id').value.toLowerCase();
        const sT = s ? new Date(s).setHours(0,0,0,0) : null;
        const eT = e ? new Date(e).setHours(23,59,59) : null;

        filteredData = allSupplierData.filter(r => {
            const d = parseDateSmart(r[5]);
            let dM = true;
            if (sT && (!d || d.getTime() < sT)) dM = false;
            if (eT && (!d || d.getTime() > eT)) dM = false;
            return dM && (r[4]||"").toLowerCase().includes(nk) && (r[3]||"").toLowerCase().includes(ik);
        });
        handleSort();
    }

    function renderList(data) {
        const area = document.getElementById('result-list');
        area.innerHTML = "";
        document.getElementById('status-msg').innerText = `找到 ${data.length} 筆訂單`;
        data.forEach(r => {
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div class="info-grid">
                    <div>
                        <span class="label">單號 / 客人姓名</span>
                        <div class="val"><strong style="color:var(--primary)">${r[3]}</strong> / ${r[4] || '-'}</div>
                        <span class="label">產品及數量</span>
                        <div class="val" style="font-weight:bold">${r[7] || '-'}</div>
                        <span class="label">送貨地址</span>
                        <div class="val" style="font-size:12px;">${r[6] || '-'}</div>
                    </div>
                    <div>
                        <span class="label">送貨日期</span>
                        <div class="val" style="color:#d63384; font-weight:bold">${formatDate(r[5])}</div>
                        <span class="label">下單日期</span>
                        <div class="val">${formatDate(r[1])}</div>
                        <span class="label">備註</span>
                        <div class="val" style="font-size:12px; font-style:italic;">${r[8] || '-'}</div>
                    </div>
                </div>
            `;
            area.appendChild(card);
        });
    }
</script>
</body>
</html>

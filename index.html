<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>供應商管理系統 | Bespoke Mall</title>
    <style>
        :root { --primary: #7f8c8d; --accent: #f8d7da; --bg: #fdf2f4; --success: #e8aeb7; --text: #5d5d5d; --white: #ffffff; --border: #f2e1e4; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: var(--text); line-height: 1.5; }
        .container { max-width: 800px; margin: 10px auto; background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        .header-logo { width: 120px; margin: 0 auto 20px; display: block; }
        
        /* 登入視窗 */
        #login-section { text-align: center; padding: 30px 0; }
        .login-box { max-width: 320px; margin: 0 auto; text-align: left; }
        .login-box input { width: 100%; margin-bottom: 15px; border: 1px solid var(--border); padding: 12px; border-radius: 6px; box-sizing: border-box; }
        
        /* 控制區 */
        #control-panel { display: none; background: #fffcfd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        input, button { padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        /* 頁籤 */
        .status-toggle-group { display: flex; border: 1px solid var(--accent); border-radius: 6px; overflow: hidden; margin-bottom: 15px; }
        .status-toggle-group button { flex: 1; background: white; color: var(--primary); border-radius: 0; border: none; border-right: 1px solid var(--accent); }
        .status-toggle-group button.active { background: var(--success); color: white; }

        /* 核心卡片修正：處理自動換行 */
        .order-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; padding: 15px; border-left: 5px solid var(--accent); }
        .info-row { margin-bottom: 12px; }
        .label { font-size: 11px; color: #999; font-weight: bold; display: block; margin-bottom: 2px; }
        
        /* 關鍵修正：確保 CSV 中的換行符號能生效 */
        .val { 
            font-size: 14px; 
            color: var(--text); 
            white-space: pre-wrap; /* 讓 \n 換行符號生效 */
            word-break: break-all;
            line-height: 1.6;
        }
        .val-product { 
            background: #f9f9f9; 
            padding: 10px; 
            border-radius: 5px; 
            color: #2c3e50; 
            border: 1px dashed var(--border);
            margin-top: 5px;
        }

        .btn-ship { background: var(--success); color: white; width: 100%; padding: 12px; border-radius: 6px; margin-top: 10px; font-size: 14px; }
        .btn-ship.shipped { background: #dcdde1; color: #7f8c8d; cursor: not-allowed; }
        .ship-time { font-size: 12px; color: var(--success); font-weight: bold; margin-top: 5px; display: block; }
        
        .loading-spin { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; margin-right: 5px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.bespoke-mall.com/pub/media/webp_image/logo/stores/1/BespokeMallv4.webp" alt="LOGO" class="header-logo">

    <div id="login-section">
        <div class="login-box">
            <input type="email" id="supplierEmail" placeholder="電子郵件 (Email)">
            <input type="password" id="supplierKey" placeholder="供應商識別碼">
            <button id="loginBtn" onclick="doLogin()" style="width:100%;">登入系統</button>
            <p id="login-msg" style="color:red; font-size:13px; display:none; margin-top:10px; text-align:center;">登入資訊有誤，請再試一次</p>
        </div>
    </div>

    <div id="control-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <button onclick="reloadData()" style="background:#e8aeb7;">更新資料</button>
            <button onclick="location.reload()" style="background:#ccc;">登出</button>
        </div>
        <div class="filter-grid">
            <input type="text" id="filter-name" placeholder="搜尋客戶姓名" oninput="applyFilters()">
            <input type="text" id="filter-id" placeholder="搜尋單號" oninput="applyFilters()">
        </div>
    </div>

    <div id="display-section" style="display:none;">
        <div class="status-toggle-group">
            <button id="tab-unshipped" class="active" onclick="setStatusFilter('unshipped')">未出貨</button>
            <button id="tab-shipped" onclick="setStatusFilter('shipped')">已出貨</button>
            <button id="tab-all" onclick="setStatusFilter('all')">全部</button>
        </div>
        <div id="result-list"></div>
    </div>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSy5sD3WWgYrJg9dqHPQgtDlD1iOdxDSWMaPoN6UEjfM89GCPT8JWHu-8qg8Likhw2DOSjnP0J6zOYK/pub?output=csv';
    // 請將下方的網址替換為您最新的 GAS 部署網址
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzpldrJh7YjQwZ_AJG20EDNx5pP6iOLWcPlGVZrh0MgPL5wnGiQR3FETo32L9miI76Q/exec';
    
    let allData = [];
    let currentKey = "", currentEmail = "";
    let isStaff = false, currentTab = 'unshipped';

    // 處理 CSV 內的引號與換行符號
    function parseCSV(text) {
        const rows = [];
        let row = [], cell = "", inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char === '"' && text[i+1] === '"') { cell += '"'; i++; }
            else if (char === '"') { inQuotes = !inQuotes; }
            else if (char === ',' && !inQuotes) { row.push(cell.trim()); cell = ""; }
            else if ((char === '\n' || char === '\r') && !inQuotes) {
                if (cell !== "" || row.length > 0) {
                    row.push(cell.trim()); rows.push(row); row = []; cell = "";
                }
            } else { cell += char; }
        }
        if (cell !== "" || row.length > 0) { row.push(cell.trim()); rows.push(row); }
        return rows;
    }

    async function doLogin() {
        currentEmail = document.getElementById('supplierEmail').value.trim();
        currentKey = document.getElementById('supplierKey').value.trim();
        if (!currentKey || !currentEmail) return;
        
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spin"></span>驗證中...';
        
        isStaff = (currentKey.toUpperCase() === "BESPOKE01" && currentEmail.toLowerCase() === "support@bespoke-mall.com");
        
        if (await loadData()) {
            document.getElementById('login-section').style.display = "none";
            document.getElementById('control-panel').style.display = "block";
            document.getElementById('display-section').style.display = "block";
            applyFilters();
        } else {
            document.getElementById('login-msg').style.display = "block";
            btn.disabled = false; btn.innerText = "登入系統";
        }
    }

    async function loadData() {
        try {
            const resp = await fetch(`${SHEET_CSV}&t=${Date.now()}`);
            const text = await resp.text();
            const rows = parseCSV(text);
            if (isStaff) {
                allData = rows.slice(1).filter(r => r[3]); 
            } else {
                // 篩選對應的供應商識別碼 (C欄/索引2) 與 Email (M欄/索引12)
                allData = rows.filter(r => 
                    r[2]?.toLowerCase() === currentKey.toLowerCase() && 
                    r[12]?.toLowerCase() === currentEmail.toLowerCase()
                );
            }
            return allData.length > 0;
        } catch (e) { return false; }
    }

    function setStatusFilter(status) {
        currentTab = status;
        document.querySelectorAll('.status-toggle-group button').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${status}`).classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const nameKey = document.getElementById('filter-name').value.toLowerCase();
        const idKey = document.getElementById('filter-id').value.toLowerCase();

        let filtered = allData.filter(r => {
            const status = (r[9] || "").trim(); // J 欄狀態
            if (currentTab === 'unshipped' && status === '已出貨') return false;
            if (currentTab === 'shipped' && status !== '已出貨') return false;
            return (r[4] || "").toLowerCase().includes(nameKey) && (r[3] || "").toLowerCase().includes(idKey);
        });
        renderUI(filtered);
    }

    function renderUI(data) {
        const container = document.getElementById('result-list');
        container.innerHTML = "";
        data.sort((a, b) => (b[5] || "").localeCompare(a[5] || ""));

        data.forEach(r => {
            const isDone = (r[9] === "已出貨");
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div class="info-row">
                    <span class="label">客戶姓名 / 單號</span>
                    <div class="val" style="font-weight:bold;">${r[4] || '-'} (#${r[3] || '-'})</div>
                </div>
                <div class="info-row">
                    <span class="label">產品及數量</span>
                    <div class="val val-product">${r[7] || '-'}</div>
                </div>
                <div class="info-row">
                    <span class="label">送貨地址</span>
                    <div class="val" style="font-size:13px;">${r[6] || '-'}</div>
                </div>
                <div class="info-row">
                    <span class="label">備註</span>
                    <div class="val" style="color:#d63031;">${r[8] || '-'}</div>
                </div>
                ${isDone ? `<span class="ship-time">✓ 已回報：${r[10] || ''}</span>` : ''}
                <button id="btn-${r[3]}" class="btn-ship ${isDone ? 'shipped' : ''}" 
                        onclick="confirmShip('${r[3]}')" ${isDone ? 'disabled' : ''}>
                    ${isDone ? '出貨同步完成' : '確認已出貨'}
                </button>
            `;
            container.appendChild(card);
        });
    }

    async function confirmShip(orderId) {
        if (!confirm(`確認單號 #${orderId} 已出貨？`)) return;
        const btn = document.getElementById(`btn-${orderId}`);
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spin"></span>同步中...';
        
        try {
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ orderId: orderId }) });
            alert('回報成功！');
            await loadData();
            applyFilters();
        } catch (e) { alert('同步失敗，請檢查網路'); btn.disabled = false; }
    }

    async function reloadData() {
        await loadData();
        applyFilters();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供應商管理系統</title>
    <style>
        :root { --primary: #2c3e50; --accent: #c5a059; --bg: #f4f7f6; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        /* 登入區域樣式 */
        #login-section { text-align: center; padding: 40px 0; }
        .login-box { max-width: 350px; margin: 0 auto; }
        
        /* 登入後縮小的控制台 */
        #control-panel { display: none; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #eee; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 10px; }
        
        input, button { padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; }
        button { background: var(--primary); color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #1a252f; }
        .btn-reset { background: #95a5a6; }

        /* 資料卡片 */
        .order-card { background: #fff; border: 1px solid #eef0f2; border-radius: 8px; margin-bottom: 15px; padding: 18px; border-left: 4px solid var(--primary); }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
        
        .label { font-size: 12px; color: #999; font-weight: bold; margin-bottom: 2px; display: block; }
        .val { font-size: 15px; color: #333; word-break: break-all; }
        .full { grid-column: span 2; }
        @media (max-width: 600px) { .full { grid-column: span 1; } }

        h2, h4 { margin-top: 0; color: var(--primary); }
        .count-tag { font-size: 14px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h2>供應商登入</h2>
        <div class="login-box">
            <input type="password" id="supplierKey" placeholder="請輸入供應商識別碼" style="width:100%; margin-bottom:10px;">
            <button onclick="doLogin()" style="width:100%;">驗證並讀取資料</button>
            <p id="login-msg" style="color:red; font-size:14px; display:none;">識別碼錯誤</p>
        </div>
    </div>

    <div id="control-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h4>資料篩選器</h4>
            <button class="btn-reset" onclick="location.reload()">重新登入</button>
        </div>
        <div class="filter-grid">
            <div>
                <span class="label">送貨日期 (起)</span>
                <input type="date" id="filter-start" onchange="applyFilters()">
            </div>
            <div>
                <span class="label">送貨日期 (迄)</span>
                <input type="date" id="filter-end" onchange="applyFilters()">
            </div>
            <div>
                <span class="label">客人姓名</span>
                <input type="text" id="filter-name" placeholder="輸入姓名..." oninput="applyFilters()">
            </div>
            <div>
                <span class="label">單號</span>
                <input type="text" id="filter-id" placeholder="輸入單號..." oninput="applyFilters()">
            </div>
        </div>
    </div>

    <div id="status-msg" class="count-tag"></div>
    <div id="result-list"></div>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSy5sD3WWgYrJg9dqHPQgtDlD1iOdxDSWMaPoN6UEjfM89GCPT8JWHu-8qg8Likhw2DOSjnP0J6zOYK/pub?output=csv';
    
    let allSupplierData = []; // 儲存該供應商的所有原始資料

    // 登入功能
    async function doLogin() {
        const key = document.getElementById('supplierKey').value.trim();
        if (!key) return;

        document.getElementById('login-msg').style.display = "none";
        
        try {
            const resp = await fetch(SHEET_CSV + '&t=' + Date.now());
            const text = await resp.text();
            const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));

            // 過濾出屬於該供應商的資料 (C欄 index 2)
            allSupplierData = rows.filter(r => r[2] && r[2].replace(/"/g, '').trim() === key);

            if (allSupplierData.length > 0) {
                // 登入成功：隱藏登入區，顯示控制台
                document.getElementById('login-section').style.display = "none";
                document.getElementById('control-panel').style.display = "block";
                applyFilters(); // 顯示初始資料
            } else {
                document.getElementById('login-msg').style.display = "block";
            }
        } catch (e) {
            alert("資料讀取失敗");
        }
    }

    // 篩選與顯示功能
    function applyFilters() {
        const start = document.getElementById('filter-start').value;
        const end = document.getElementById('filter-end').value;
        const nameKwd = document.getElementById('filter-name').value.toLowerCase();
        const idKwd = document.getElementById('filter-id').value.toLowerCase();

        const filtered = allSupplierData.filter(row => {
            const delivDate = row[5] ? row[5].replace(/"/g, '').trim() : ""; // F欄 送貨日期
            const name = row[4] ? row[4].replace(/"/g, '').trim().toLowerCase() : ""; // E欄 姓名
            const orderId = row[3] ? row[3].replace(/"/g, '').trim().toLowerCase() : ""; // D欄 單號

            // 日期篩選邏輯
            let dateMatch = true;
            if (start && delivDate < start) dateMatch = false;
            if (end && delivDate > end) dateMatch = false;

            // 關鍵字篩選邏輯
            const nameMatch = name.includes(nameKwd);
            const idMatch = orderId.includes(idKwd);

            return dateMatch && nameMatch && idMatch;
        });

        renderList(filtered);
    }

    function renderList(data) {
        const listArea = document.getElementById('result-list');
        const status = document.getElementById('status-msg');
        listArea.innerHTML = "";
        status.innerText = `顯示筆數：${data.length}`;

        data.forEach(row => {
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div class="info-grid">
                    <div class="item"><span class="label">下單日期</span><div class="val">${clean(row[1])}</div></div>
                    <div class="item"><span class="label">單號</span><div class="val">${clean(row[3])}</div></div>
                    <div class="item"><span class="label">客人姓名</span><div class="val">${clean(row[4])}</div></div>
                    <div class="item"><span class="label">送貨日期</span><div class="val">${clean(row[5])}</div></div>
                    <div class="item full"><span class="label">送貨地址</span><div class="val">${clean(row[6])}</div></div>
                    <div class="item full"><span class="label">產品及數量</span><div class="val">${clean(row[7])}</div></div>
                    <div class="item full"><span class="label">備註</span><div class="val">${clean(row[8])}</div></div>
                </div>
            `;
            listArea.appendChild(card);
        });
    }

    function clean(str) {
        return str ? str.replace(/"/g, '').trim() : '-';
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供應商出貨即時查詢系統</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { text-align: center; margin-bottom: 2rem; }
        h2 { margin: 0; color: #0f172a; font-size: 1.5rem; }
        
        .search-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 2rem; }
        input { padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px; width: 240px; font-size: 16px; transition: border-color 0.2s; }
        input:focus { border-color: var(--primary); outline: none; }
        button { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 16px; }
        button:hover { background: #1d4ed8; }

        .table-container { overflow-x: auto; display: none; margin-top: 1.5rem; border: 1px solid #e2e8f0; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th { background: #f8fafc; padding: 14px; text-align: left; font-size: 0.875rem; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 16px 14px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; vertical-align: top; }
        
        .order-tag { font-weight: 700; color: #1e293b; }
        .product-info { color: #2563eb; font-weight: 500; }
        .remark-text { color: #64748b; font-size: 0.85rem; line-height: 1.5; }
        
        .status { text-align: center; margin-top: 1rem; font-weight: 500; }
        #loading { display: none; color: var(--primary); }
        #error { display: none; color: #ef4444; background: #fee2e2; padding: 12px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h2>供應商出貨即時查詢</h2>
            <p>輸入識別碼獲取最新訂單與配送資訊</p>
        </div>

        <div class="search-group">
            <input type="text" id="sidInput" placeholder="請輸入識別碼...">
            <button onclick="doQuery()">查詢</button>
        </div>

        <div id="loading" class="status">🔄 正在連線至雲端資料庫...</div>
        <div id="error" class="status">⚠️ 查無資料，請確認識別碼或聯繫客服。</div>

        <div id="resultArea" class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>單號</th>
                        <th>客人姓名</th>
                        <th>送貨日期</th>
                        <th>送貨地址</th>
                        <th>產品及數量</th>
                        <th>備註 (Remark)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 這是你剛剛生成的最終 Web App 網址
    const API_URL = "https://script.google.com/macros/s/AKfycbxFc6guxQYJ_AN8-6r1S1iMI5hhAxDJ0zfA8B_1cJAdRMmPeFLde5RKse1aNs5Y9ATMQg/exec";

    async function doQuery() {
        const sid = document.getElementById('sidInput').value.trim();
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const result = document.getElementById('resultArea');
        const tbody = document.getElementById('tableBody');

        if (!sid) return;

        // 畫面初始化
        loading.style.display = 'block';
        error.style.display = 'none';
        result.style.display = 'none';

        try {
            // 發送請求
            const response = await fetch(`${API_URL}?sid=${encodeURIComponent(sid)}`);
            if (!response.ok) throw new Error();
            const data = await response.json();

            if (data && data.length > 0) {
                loading.style.display = 'none';
                result.style.display = 'block';
                
                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td class="order-tag">${item.order_no || '-'}</td>
                        <td>${item.customer || '-'}</td>
                        <td>${item.date || '-'}</td>
                        <td>${item.address || '-'}</td>
                        <td class="product-info">${item.product || '-'}</td>
                        <td class="remark-text">${item.remark || '-'}</td>
                    </tr>
                `).join('');
            } else {
                throw new Error("Empty data");
            }
        } catch (e) {
            loading.style.display = 'none';
            error.style.display = 'block';
            console.error("Query Error:", e);
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>供應商管理系統 | Bespoke Mall</title>
    <style>
        :root { 
            --primary: #7f8c8d;
            --accent: #f8d7da;
            --bg: #fdf2f4;
            --success: #e8aeb7;
            --text: #5d5d5d;
            --white: #ffffff;
            --border: #f2e1e4;
        }
        
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 15px; 
            color: var(--text); 
            line-height: 1.6;
        }
        
        .container { 
            max-width: 900px; 
            margin: 20px auto; 
            background: var(--white); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.05); 
            box-sizing: border-box; 
        }

        .header-logo { width: 100px; margin-bottom: 20px; display: block; }
        
        /* 登入區塊 */
        #login-section { text-align: center; padding: 40px 0; }
        .login-box { max-width: 350px; margin: 0 auto; text-align: left; }
        .login-box label { font-size: 13px; color: #888; margin-bottom: 5px; display: block; font-weight: bold; }
        .login-box input { width: 100%; margin-bottom: 20px; border: 1px solid var(--border); }
        
        /* 控制面板 */
        #control-panel { 
            display: none; 
            background: #fef9fa; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 25px; 
            border: 1px solid var(--border); 
            box-sizing: border-box; 
        }
        .filter-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin-top: 10px; 
        }
        
        input, button, select { 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid #ddd; 
            font-size: 14px; 
            box-sizing: border-box; 
            outline: none;
        }

        button { 
            background: var(--primary); 
            color: white; 
            cursor: pointer; 
            border: none; 
            font-weight: bold; 
            transition: background 0.3s; 
        }
        button:hover { opacity: 0.9; }
        .btn-reload { background: var(--success); }
        .btn-logout { background: #bdc3c7; }

        /* 狀態切換按鈕 */
        .status-toggle-wrapper { margin-bottom: 15px; display: flex; justify-content: center; }
        .status-toggle-group { 
            display: flex; 
            border: 1px solid var(--accent); 
            border-radius: 6px; 
            overflow: hidden; 
            width: 100%; 
            max-width: 450px; 
        }
        .status-toggle-group button { 
            flex: 1; 
            background: white; 
            color: var(--primary); 
            padding: 12px; 
            border-radius: 0; 
            font-size: 14px; 
            border-right: 1px solid var(--accent);
        }
        .status-toggle-group button:last-child { border-right: none; }
        .status-toggle-group button.active { background: var(--success); color: white; }

        /* 排序與計數 */
        .status-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            flex-wrap: wrap; 
            gap: 10px; 
            padding-bottom: 10px; 
            border-bottom: 1px dashed var(--accent); 
        }
        .sort-controls { display: flex; align-items: center; gap: 10px; }
        .order-toggle { 
            background: #fff; 
            color: var(--primary); 
            border: 1px solid var(--accent); 
            display: flex; 
            border-radius: 6px; 
            overflow: hidden;
        }
        .order-toggle span { padding: 8px 15px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .order-toggle span.active { background: var(--success); color: white; }

        /* 訂單卡片 */
        .order-card { 
            background: #fff; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            margin-bottom: 15px; 
            padding: 20px; 
            border-left: 5px solid var(--accent); 
            position: relative; 
        }
        .info-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 15px; }
        .label { font-size: 11px; color: #aaa; font-weight: bold; margin-bottom: 3px; display: block; }
        .val { font-size: 14px; color: var(--text); margin-bottom: 12px; word-break: break-all; }
        
        .ship-time-tag { 
            font-size: 12px; 
            color: var(--success); 
            margin: 5px 0 10px 0; 
            font-style: italic; 
            display: block; 
            font-weight: bold; 
        }

        .btn-ship { 
            background: var(--success); 
            color: white; 
            width: 100%; 
            padding: 12px; 
            border-radius: 6px; 
            margin-top: 5px; 
            font-size: 14px; 
        }
        .btn-ship.shipped { background: #d5dadd; color: #7f8c8d; cursor: not-allowed; }

        .loading-spin { 
            display: inline-block; width: 14px; height: 14px; 
            border: 2px solid rgba(255,255,255,.3); 
            border-radius: 50%; border-top-color: #fff; 
            animation: spin 1s linear infinite; margin-right: 8px; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .container { padding: 15px; margin: 0; border-radius: 0; }
            .info-grid { grid-template-columns: 1fr; gap: 0; }
            .status-bar { flex-direction: column; align-items: flex-start; }
            .sort-controls { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.bespoke-mall.com/pub/media/webp_image/logo/stores/1/BespokeMallv4.webp" alt="LOGO" class="header-logo">

    <div id="login-section">
        <h2 style="color:var(--primary); margin-bottom:30px;">供應商管理系統</h2>
        <div class="login-box">
            <label>電子郵件 (Email) :</label>
            <input type="email" id="supplierEmail" placeholder="請輸入登記之電子郵件">
            
            <label>供應商識別碼 :</label>
            <input type="password" id="supplierKey" placeholder="請輸入識別碼">
            
            <button id="loginBtn" onclick="doLogin()" style="width:100%;">登入系統</button>
            <p id="login-msg" style="color:#e81e63; font-size:14px; display:none; margin-top:15px; text-align:center; font-weight:bold;">驗證失敗，請檢查輸入資料</p>
        </div>
    </div>

    <div id="control-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:15px;">
            <h3 style="margin:0; color:var(--primary);">訂單搜尋</h3>
            <div style="display:flex; gap:10px;">
                <button class="btn-reload" id="reloadBtn" onclick="reloadData()">更新資料</button>
                <button class="btn-logout" onclick="location.reload()">登出</button>
            </div>
        </div>
        <div class="filter-grid">
            <div><span class="label">送貨日期 (從)</span><input type="date" id="filter-start" onchange="applyFilters()" style="width:100%;"></div>
            <div><span class="label">送貨日期 (至)</span><input type="date" id="filter-end" onchange="applyFilters()" style="width:100%;"></div>
            <div><span class="label">客戶姓名</span><input type="text" id="filter-name" placeholder="搜尋姓名..." oninput="applyFilters()" style="width:100%;"></div>
            <div><span class="label">訂單單號</span><input type="text" id="filter-id" placeholder="搜尋單號..." oninput="applyFilters()" style="width:100%;"></div>
        </div>
    </div>

    <div id="display-section" style="display:none;">
        <div class="status-toggle-wrapper">
            <div class="status-toggle-group">
                <button id="tab-unshipped" class="active" onclick="setStatusFilter('unshipped')">未出貨</button>
                <button id="tab-shipped" onclick="setStatusFilter('shipped')">已出貨</button>
                <button id="tab-all" onclick="setStatusFilter('all')">全部訂單</button>
            </div>
        </div>

        <div class="status-bar">
            <div id="status-msg" style="font-weight:bold; color:var(--primary);"></div>
            <div class="sort-controls">
                <select id="sortField" onchange="handleSort()">
                    <option value="id">按單號排序</option>
                    <option value="date" selected>按送貨日期</option>
                </select>
                <div class="order-toggle">
                    <span id="order-asc" onclick="setSortOrder('asc')">升序</span>
                    <span id="order-desc" class="active" onclick="setSortOrder('desc')">降序</span>
                </div>
            </div>
        </div>
        <div id="result-list"></div>
    </div>
</div>

<script>
    // 配置資訊
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSy5sD3WWgYrJg9dqHPQgtDlD1iOdxDSWMaPoN6UEjfM89GCPT8JWHu-8qg8Likhw2DOSjnP0J6zOYK/pub?output=csv';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwtoypHyFl1VT0boxpe8_RCSt0c8Z1NdxkfMenIn6GQp5EYbbF2JhZia3yTU31uWEG2/exec';
    
    let allData = [];
    let currentKey = "", currentEmail = "";
    let isStaff = false, filteredData = [], sortOrder = 'desc', currentTab = 'unshipped';

    async function doLogin() {
        currentEmail = document.getElementById('supplierEmail').value.trim();
        currentKey = document.getElementById('supplierKey').value.trim();
        if (!currentKey || !currentEmail) return;

        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spin"></span>驗證中...';
        
        isStaff = (currentKey.toUpperCase() === "BESPOKE01" && currentEmail.toLowerCase() === "support@bespoke-mall.com");
        
        if (await loadData()) {
            document.getElementById('login-section').style.display = "none";
            document.getElementById('control-panel').style.display = "block";
            document.getElementById('display-section').style.display = "block";
            applyFilters();
        } else {
            document.getElementById('login-msg').style.display = "block";
            btn.disabled = false; btn.innerText = "登入系統";
        }
    }

    async function loadData() {
        try {
            const resp = await fetch(`${SHEET_CSV}&t=${Date.now()}`);
            const text = await resp.text();
            // 處理內容中可能含逗號的情況
            const rows = text.split('\n').map(row => row.split(',').map(cell => cell.replace(/^"|"$/g, '').trim()));
            
            if (isStaff) {
                allData = rows.slice(1).filter(r => r[3]); 
            } else {
                allData = rows.filter(r => 
                    r[2]?.toLowerCase() === currentKey.toLowerCase() && 
                    r[12]?.toLowerCase() === currentEmail.toLowerCase()
                );
            }
            return allData.length > 0;
        } catch (e) { return false; }
    }

    function setStatusFilter(status) {
        currentTab = status;
        document.querySelectorAll('.status-toggle-group button').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${status}`).classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const start = document.getElementById('filter-start').value;
        const end = document.getElementById('filter-end').value;
        const nameKey = document.getElementById('filter-name').value.toLowerCase();
        const idKey = document.getElementById('filter-id').value.toLowerCase();
        
        filteredData = allData.filter(r => {
            const status = (r[9] || "").trim();
            if (currentTab === 'unshipped' && status === '已出貨') return false;
            if (currentTab === 'shipped' && status !== '已出貨') return false;

            const matchName = (r[4] || "").toLowerCase().includes(nameKey);
            const matchId = (r[3] || "").toLowerCase().includes(idKey);
            
            let matchDate = true;
            if (start || end) {
                const targetDate = new Date(r[5]).getTime();
                if (start && targetDate < new Date(start).getTime()) matchDate = false;
                if (end && targetDate > new Date(end).getTime()) matchDate = false;
            }
            return matchName && matchId && matchDate;
        });
        handleSort();
    }

    function handleSort() {
        const field = document.getElementById('sortField').value;
        filteredData.sort((a, b) => {
            const valA = a[field === 'id' ? 3 : 5] || "";
            const valB = b[field === 'id' ? 3 : 5] || "";
            return sortOrder === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
        });
        renderUI();
    }

    function setSortOrder(order) {
        sortOrder = order;
        document.getElementById('order-asc').classList.toggle('active', order === 'asc');
        document.getElementById('order-desc').classList.toggle('active', order === 'desc');
        handleSort();
    }

    function renderUI() {
        const container = document.getElementById('result-list');
        container.innerHTML = "";
        document.getElementById('status-msg').innerText = `找到 ${filteredData.length} 筆訂單`;
        
        filteredData.forEach(r => {
            const isDone = (r[9] === "已出貨");
            const doneTime = r[10] || "";
            
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div class="info-grid">
                    <div>
                        <span class="label">客戶姓名</span><div class="val" style="font-weight:bold;">${r[4] || '-'}</div>
                        <span class="label">產品內容</span><div class="val">${r[7] || '-'}</div>
                        <span class="label">備註</span><div class="val" style="color:#e8aeb7;">${r[8] || '-'}</div>
                    </div>
                    <div>
                        <span class="label">訂單單號</span><div class="val" style="color:var(--primary); font-weight:bold;">#${r[3] || '-'}</div>
                        <span class="label">送貨日期</span><div class="val" style="font-weight:bold;">${r[5] || '-'}</div>
                        <span class="label">送貨地址</span><div class="val" style="font-size:12px;">${r[6] || '-'}</div>
                    </div>
                </div>
                <div id="box-${r[3]}">
                    ${isDone ? `<span class="ship-time-tag">✓ 已於 ${doneTime} 回報出貨</span>` : ''}
                </div>
                <button id="btn-${r[3]}" class="btn-ship ${isDone ? 'shipped' : ''}" 
                        onclick="confirmShip('${r[3]}')" ${isDone ? 'disabled' : ''}>
                    ${isDone ? '已同步至系統' : '確認已出貨'}
                </button>
            `;
            container.appendChild(card);
        });
    }

    async function confirmShip(orderId) {
        if (!confirm(`確定將單號 #${orderId} 標註為已出貨並同步至 Excel 嗎？`)) return;
        
        const btn = document.getElementById(`btn-${orderId}`);
        const box = document.getElementById(`box-${orderId}`);
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spin"></span>同步中...';
        
        const now = new Date();
        const timeStr = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

        try {
            await fetch(GAS_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ orderId: orderId }) 
            });
            
            btn.innerText = "已同步至系統";
            btn.classList.add('shipped');
            box.innerHTML = `<span class="ship-time-tag">✓ 已於 ${timeStr} 回報出貨 (即時同步)</span>`;
            
            const target = allData.find(r => r[3] === orderId);
            if (target) { target[9] = "已出貨"; target[10] = timeStr; }
            
        } catch (e) { 
            alert('連線失敗，請重試'); 
            btn.disabled = false; 
            btn.innerText = "確認已出貨";
        }
    }
    
    async function reloadData() {
        const btn = document.getElementById('reloadBtn');
        btn.innerHTML = '<span class="loading-spin"></span>讀取中';
        await loadData();
        applyFilters();
        btn.innerText = "更新資料";
    }
</script>
</body>
</html>

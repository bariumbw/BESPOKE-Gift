<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時出貨查詢系統</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 250px; }
        button { padding: 12px 24px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; display: none; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 15px; text-align: left; font-size: 14px; }
        th { background: #f8fafc; color: #64748b; }
        .loading { display: none; text-align: center; color: #2563eb; font-weight: bold; }
        .error { display: none; color: #ef4444; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align: center;">供應商即時查詢系統</h2>
    <div class="search-box">
        <input type="text" id="sid" placeholder="請輸入 supplier_id">
        <button onclick="queryData()">即時查詢</button>
    </div>

    <div id="loading" class="loading">連線至試算表中...</div>
    <div id="error" class="error">找不到符合資料，請確認 ID 是否正確。</div>

    <div id="resultTable" style="overflow-x: auto;">
        <table id="shipmentTable">
            <thead>
                <tr>
                    <th>單號</th>
                    <th>客人姓名</th>
                    <th>送貨日期</th>
                    <th>地址</th>
                    <th>產品/數量</th>
                    <th>備註</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 貼上你的 Google Apps Script 部署網址
    const API_URL = "在此處貼上部署網址";

    async function queryData() {
        const sid = document.getElementById('sid').value.trim();
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const table = document.getElementById('shipmentTable');
        const tbody = document.getElementById('tableBody');

        if (!sid) return;

        loading.style.display = 'block';
        error.style.display = 'none';
        table.style.display = 'none';

        try {
            // 直接呼叫 Google Apps Script Web App
            const response = await fetch(`${API_URL}?sid=${encodeURIComponent(sid)}`);
            const data = await response.json();

            if (data.length > 0) {
                loading.style.display = 'none';
                table.style.display = 'table';
                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td><strong>${item.order_no}</strong></td>
                        <td>${item.customer}</td>
                        <td>${item.date}</td>
                        <td>${item.address}</td>
                        <td style="color:#1e40af">${item.product}</td>
                        <td style="color:#64748b; font-size:12px">${item.remark}</td>
                    </tr>
                `).join('');
            } else {
                throw new Error();
            }
        } catch (e) {
            loading.style.display = 'none';
            error.style.display = 'block';
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>供應商系統 - 雙欄行動版</title>
    <style>
        :root { 
            --primary: #7f8c8d;
            --accent: #f8d7da;
            --bg: #fdf2f4;
            --success: #e8aeb7;
            --text: #5d5d5d;
            --white: #ffffff;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 8px; 
            color: var(--text); 
        }
        
        .container { max-width: 1000px; margin: 0 auto; background: var(--white); padding: 12px; border-radius: 12px; }
        .header-logo { width: 60px; margin: 0 auto 10px auto; display: block; }
        
        input, button, select { 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid #ddd; 
            font-size: 14px; 
            width: 100%;
            box-sizing: border-box;
        }
        
        button { background: var(--primary); color: white; font-weight: bold; border: none; }
        .btn-reload { background: var(--success); flex: 1; }
        .btn-logout { background: #bdc3c7; flex: 1; }

        #control-panel { display: none; background: #fef9fa; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #f2e1e4; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }

        .status-bar { display: none; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .sort-controls { display: flex; gap: 5px; width: 100%; }
        
        .order-toggle { display: flex; border: 1px solid var(--accent); border-radius: 6px; overflow: hidden; background: white; min-width: 80px; }
        .order-toggle span { flex: 1; padding: 8px 5px; text-align: center; font-size: 12px; cursor: pointer; }
        .order-toggle span.active { background: var(--success); color: white; }

        /* 核心修改：卡片網格佈局 */
        #result-list { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* 強制雙欄 */
            gap: 8px; 
        }

        .order-card { 
            background: #fff; 
            border: 1px solid #f2e1e4; 
            border-radius: 8px; 
            padding: 10px; 
            border-top: 3px solid var(--accent); /* 改為頂部線條節省空間 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .info-item { margin-bottom: 6px; }
        .label { font-size: 10px; color: #bbb; font-weight: bold; margin-bottom: 1px; }
        .val { font-size: 13px; color: var(--text); line-height: 1.3; overflow-wrap: break-word; }
        
        .order-id-tag { color: var(--primary); font-weight: bold; font-size: 13px; }
        .delivery-date-tag { color: #d63384; font-weight: bold; font-size: 12px; }

        /* 平板以上寬度轉為三欄 */
        @media (min-width: 768px) {
            #result-list { grid-template-columns: repeat(3, 1fr); }
            .status-bar { flex-direction: row; justify-content: space-between; align-items: center; }
            .sort-controls { width: auto; }
        }

        h2, h4 { margin: 5px 0; color: var(--primary); text-align: center; font-size: 16px; }
        .count-tag { font-size: 12px; color: #999; text-align: center; }
        .loading-spin { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.bespoke-mall.com/pub/media/webp_image/logo/stores/1/BespokeMallv4.webp" alt="LOGO" class="header-logo">

    <div id="login-section">
        <h2>供應商系統</h2>
        <input type="text" id="supplierKey" placeholder="輸入識別碼" style="margin-bottom:10px;">
        <button id="loginBtn" onclick="doLogin()">登入</button>
        <p id="login-msg" style="color:#e8aeb7; font-size:12px; display:none; margin-top:10px;">識別碼錯誤</p>
    </div>

    <div id="control-panel">
        <div class="filter-grid">
            <div><span class="label">日期 (起)</span><input type="date" id="filter-start" onchange="applyFilters()"></div>
            <div><span class="label">日期 (迄)</span><input type="date" id="filter-end" onchange="applyFilters()"></div>
            <div><input type="text" id="filter-name" placeholder="姓名..." oninput="applyFilters()"></div>
            <div><input type="text" id="filter-id" placeholder="單號..." oninput="applyFilters()"></div>
        </div>
        <div class="btn-group">
            <button class="btn-reload" id="reloadBtn" onclick="reloadData()">更新</button>
            <button class="btn-logout" onclick="location.reload()">登出</button>
        </div>
    </div>

    <div id="result-header" class="status-bar">
        <div id="status-msg" class="count-tag"></div>
        <div class="sort-controls">
            <select id="sortField" onchange="handleSort()" style="flex:2;">
                <option value="id" selected>單號</option>
                <option value="date">日期</option>
            </select>
            <div class="order-toggle" style="flex:1;">
                <span id="order-asc" onclick="setSortOrder('asc')">升</span>
                <span id="order-desc" class="active" onclick="setSortOrder('desc')">降</span>
            </div>
        </div>
    </div>
    
    <div id="result-list"></div>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSy5sD3WWgYrJg9dqHPQgtDlD1iOdxDSWMaPoN6UEjfM89GCPT8JWHu-8qg8Likhw2DOSjnP0J6zOYK/pub?output=csv';
    let allSupplierData = [];
    let currentKey = "";
    let filteredData = [];
    let currentSortOrder = 'desc';

    function parseCSVStrict(str) {
        const arr = []; let quote = false;
        for (let row = col = c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
            if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\n' && !quote) { ++row; col = 0; continue; }
            arr[row][col] += cc;
        }
        return arr;
    }

    function parseDateSmart(dateStr) {
        if (!dateStr || dateStr === '-') return null;
        let d = new Date(dateStr);
        if (!isNaN(d.getTime())) return d;
        const m = dateStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
        return m ? new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3])) : null;
    }

    function formatDate(dateStr) {
        const d = parseDateSmart(dateStr);
        return d ? `${d.getMonth()+1}/${d.getDate()}` : (dateStr || '-');
    }

    async function loadDataFromServer() {
        try {
            const resp = await fetch(SHEET_CSV + '&t=' + Date.now());
            const text = await resp.text();
            const rows = parseCSVStrict(text);
            const sk = currentKey.trim().toLowerCase();
            allSupplierData = rows.filter(r => r[2] && r[2].trim().toLowerCase() === sk);
            return allSupplierData.length > 0;
        } catch (e) { return false; }
    }

    async function doLogin() {
        currentKey = document.getElementById('supplierKey').value.trim();
        if (!currentKey) return;
        if (await loadDataFromServer()) {
            document.getElementById('login-section').style.display = "none";
            document.getElementById('control-panel').style.display = "block";
            document.getElementById('result-header').style.display = "flex";
            applyFilters();
        } else {
            document.getElementById('login-msg').style.display = "block";
        }
    }

    async function reloadData() {
        const btn = document.getElementById('reloadBtn');
        btn.innerHTML = '<span class="loading-spin"></span>';
        await loadDataFromServer();
        applyFilters();
        btn.innerText = "更新";
    }

    function setSortOrder(order) {
        currentSortOrder = order;
        document.getElementById('order-asc').classList.toggle('active', order === 'asc');
        document.getElementById('order-desc').classList.toggle('active', order === 'desc');
        handleSort();
    }

    function handleSort() {
        const field = document.getElementById('sortField').value;
        const isAsc = currentSortOrder === 'asc';
        filteredData.sort((a, b) => {
            if (field === 'id') {
                return isAsc ? a[3].localeCompare(b[3], undefined, {numeric:true}) : b[3].localeCompare(a[3], undefined, {numeric:true});
            } else {
                return isAsc ? (parseDateSmart(a[5]) - parseDateSmart(b[5])) : (parseDateSmart(b[5]) - parseDateSmart(a[5]));
            }
        });
        renderList(filteredData);
    }

    function applyFilters() {
        const s = document.getElementById('filter-start').value;
        const e = document.getElementById('filter-end').value;
        const nk = document.getElementById('filter-name').value.toLowerCase();
        const ik = document.getElementById('filter-id').value.toLowerCase();
        const sT = s ? new Date(s).setHours(0,0,0,0) : null;
        const eT = e ? new Date(e).setHours(23,59,59) : null;

        filteredData = allSupplierData.filter(r => {
            const d = parseDateSmart(r[5]);
            let dM = true;
            if (sT && (!d || d.getTime() < sT)) dM = false;
            if (eT && (!d || d.getTime() > eT)) dM = false;
            return dM && (r[4]||"").toLowerCase().includes(nk) && (r[3]||"").toLowerCase().includes(ik);
        });
        handleSort();
    }

    function renderList(data) {
        const area = document.getElementById('result-list');
        area.innerHTML = "";
        document.getElementById('status-msg').innerText = `共 ${data.length} 筆`;
        data.forEach(r => {
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div class="info-item">
                    <span class="label">單號 / 姓名</span>
                    <div class="val"><span class="order-id-tag">${r[3]}</span><br>${r[4] || '-'}</div>
                </div>
                <div class="info-item">
                    <span class="label">送貨日期</span>
                    <div class="val delivery-date-tag">${formatDate(r[5])}</div>
                </div>
                <div class="info-item">
                    <span class="label">產品數量</span>
                    <div class="val" style="font-weight:500;">${r[7] || '-'}</div>
                </div>
                <div class="info-item">
                    <span class="label">備註</span>
                    <div class="val" style="font-size:11px; color:#888;">${r[8] || '-'}</div>
                </div>
            `;
            area.appendChild(card);
        });
    }
</script>
</body>
</html>
